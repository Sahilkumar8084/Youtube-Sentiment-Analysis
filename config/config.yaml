artifacts_root: artifacts

data_ingestion: 
  root_dir: artifacts/data_ingestion
  local_data_files: artifacts/data_ingestion/data.db
  

data_labelling:
  # database_path: artifacts\data_ingestion\data.db 
  database_path: artifacts/data_ingestion/data.db

data_conversion:
  root_dir: artifacts/data_conversion
  db_path: artifacts/data_ingestion/data.db
  table_name: comments
  converted_data_path: artifacts/data_conversion/data.csv

data_cleaning:
  cleaning_root: artifacts/data_cleaning
  data_path: artifacts/data_conversion/data.csv
  saved_data: artifacts/data_cleaning/data.csv

data_report:
  root_dir: artifacts/data_report
  data_path: artifacts/data_cleaning/data.csv
  report_path: artifacts/data_report/data_report.txt

eda_report:
  root_dir: artifacts/eda_report
  data_path: artifacts/data_cleaning/data.csv
  output_report: artifacts/eda_report

data_transformation:
  root_dir: artifacts/data_transformation
  data_path: artifacts/data_cleaning/data.csv
  vectorizer_path: artifacts/data_transformation/vectorizer.joblib

model_training:
  root_dir: artifacts/model_training
  train_data_path: artifacts\data_transformation\train.csv
  test_data_path: artifacts\data_transformation\test.csv
  model_path: artifacts/model_training/model.joblib
  train_embedding: artifacts\embeddings\train_embeddings.npy
  test_embedding: artifacts\embeddings\test_embeddings.npy
  model_name: "SVC"

model_evaluation:
  root_dir: artifacts/model_evaluation
  test_data_path: artifacts\data_transformation\test.csv
  test_embedding: artifacts\embeddings\test_embeddings.npy
  model_path: artifacts\model_training\model.joblib
  vectorizer_path: artifacts\data_transformation\vectorizer.joblib
  evaluation_metrics_path: artifacts/model_evaluation/metrics.json
  # f1_score_threshold: 0.7
  curve_img: artifacts/model_evaluation/roc_auc_curve.jpg

mlflow:
  mlflow_tracking_uri: "https://dagshub.com/sahilkumarrock8084/Youtube-Sentiment-Analysis.mlflow"
  mlflow_experiment_name: "YouTube_Sentiment_Analysis"
  mlflow_registered_model_name: "sentiment_model"

